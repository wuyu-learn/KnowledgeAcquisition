<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基金管理人</title>
  <link rel="stylesheet" href="./css/component.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/demo-nav.css">
  <style>
    /* 基金管理人页面表格列宽微调 */
    .fund-manager-table .col-amount {
      min-width: 130px;
      text-align: right;
      padding-right: 16px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .fund-manager-table .col-rank {
      min-width: 90px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .fund-manager-table .col-abbr {
      min-width: 110px;
      white-space: nowrap;
    }
    .fund-manager-table .col-area {
      min-width: 90px;
      text-align: center;
      white-space: nowrap;
    }
    .fund-manager-table .col-type {
      min-width: 130px;
      white-space: nowrap;
    }

    /* 筛选区 label 与输入框间距修复 */
    .filter-grid--simple .field {
      flex-basis: 430px;
      max-width: 460px;
      gap: 8px;
    }
    .filter-grid--simple .field label {
      width: 112px;
    }
    .filter-grid--simple input.filter-input {
      min-width: 260px;
    }
    .filter-grid--simple .btn-row {
      flex: 0 0 100%;
      justify-content: flex-end;
      margin-left: 0;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       A. 顶部导航
       ============================================================ -->
  <header class="top-nav-bar">
    <nav class="top-nav">
      <div class="nav-logo">
        <div class="nav-logo-icon">CUAM</div>
        <div class="nav-logo-text">
          <span class="main-title">信披与报告管理平台</span>
          <span class="sub-title">汇添富基金管理股份有限公司</span>
        </div>
      </div>

      <ul class="nav-menu">
        <li class="nav-menu-item">
          <span class="menu-icon">☰</span>工作台
        </li>
        <li class="nav-menu-item active">
          <span class="menu-icon">☰</span>基金管理人
        </li>
        <li class="nav-menu-item">
          <span class="menu-icon">☰</span>信批日历
        </li>
        <li class="nav-menu-item">
          <span class="menu-icon">☰</span>模板管理
        </li>
        <li class="nav-menu-item">
          <span class="menu-icon">☰</span>数据管理
        </li>
        <li class="nav-menu-item">
          <span class="menu-icon">☰</span>系统管理
        </li>
      </ul>

      <div class="nav-actions">
        <div class="user-info">
          <span class="user-icon">👤</span>
          员工A
        </div>
        <div class="action-btn">
          <span class="action-icon">↪</span>
          退出
        </div>
      </div>
    </nav>
  </header>

  <!-- ============================================================
       B. 系统标签栏
       ============================================================ -->
  <div class="system-tabs-bar" id="tabBar">
    <div class="breadcrumb-trail" aria-label="位置">工作台</div>
    <div class="dynamic-tab-item active" data-tab="fund-manager">
      <span class="tab-title">基金管理人</span>
      <span class="tab-close-icon" title="关闭标签" role="button" aria-label="关闭">×</span>
    </div>
  </div>

  <!-- ============================================================
       C. 业务主体
       ============================================================ -->
  <main class="page-body">

    <!-- C.1 筛选区 -->
    <div class="filter-section">
      <section class="panel filters">
        <div class="filter-grid filter-grid--simple">
          <div class="field">
            <label for="managerName">基金管理人名称</label>
            <input type="text" id="managerName" class="control filter-input" placeholder="请输入基金管理人名称">
          </div>
          <div class="field">
            <label for="endDateSelect">截止日期</label>
            <select id="endDateSelect" class="control filter-input">
              <option value="">全部</option>
            </select>
          </div>
          <div class="field">
            <label for="areaSelect">地区</label>
            <select id="areaSelect" class="control filter-input">
              <option value="">全部</option>
            </select>
          </div>
          <div class="field">
            <label for="companyTypeSelect">公司类型</label>
            <select id="companyTypeSelect" class="control filter-input">
              <option value="">全部</option>
            </select>
          </div>
          <div class="btn-row">
            <button class="btn primary" id="searchBtn">查询</button>
            <button class="btn" id="resetBtn">重置</button>
            <button class="btn" id="exportBtn">导出列表</button>
          </div>
        </div>
      </section>
    </div>

    <!-- C.2 列表区 -->
    <section class="panel">
      <div class="table-toolbar">
        <div class="selection-info" id="selectionInfo">已选择 0 条</div>
        <div class="btn-row">
          <button class="btn btn-refresh" id="refreshBtn" title="刷新列表"><span class="refresh-icon">↻</span> 刷新</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="fund-manager-table">
          <thead>
            <tr>
              <th class="check-col"><input id="checkAll" aria-label="全选" type="checkbox"></th>
              <th class="col-index">序号</th>
              <th class="knowledge-col">管理人名称</th>
              <th class="col-abbr">管理人简称</th>
              <th class="col-area">地区</th>
              <th class="col-type">公司类型</th>
              <th class="col-amount">非货规模(亿)</th>
              <th class="col-rank">非货规模排名</th>
              <th class="time-col">截止日期</th>
            </tr>
          </thead>
          <tbody id="resultRows">
            <!-- 由 js/fund-manager.js 根据 data/fund-manager-data.js 动态渲染 -->
          </tbody>
        </table>
        <div class="empty" id="emptyState" hidden>暂无符合条件的基金管理人</div>
      </div>

      <!-- 分页组件 -->
      <div class="pagination-container" id="pagination">
        <div class="pagination-info">
          共 <span class="pagination-total" id="paginationTotal">0</span> 条
        </div>

        <div class="pagination-size">
          <select class="control pagination-size-select" id="pageSizeSelect">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
          <span class="pagination-size-suffix">条/页</span>
        </div>

        <div class="pagination-nav" id="paginationNav">
          <button class="page-btn page-btn-prev" data-page="prev" title="上一页" disabled>‹</button>
          <button class="page-btn active" data-page="1">1</button>
          <button class="page-btn page-btn-next" data-page="next" title="下一页" disabled>›</button>
        </div>

        <div class="pagination-jump">
          前往
          <input type="number" class="control pagination-jump-input" id="jumpInput" min="1">
          页
        </div>
      </div>
    </section>

  </main>

  <!-- ============================================================
       D. Modal / Toast 浮层
       ============================================================ -->
  <div class="toast" id="toast"></div>

  <!-- 演示导航辅助面板挂载点 -->
  <div id="demo-nav-root"></div>

  <script src="./data/fund-manager-data.js"></script>
  <script src="./js/fund-manager.js"></script>
  <script src="./js/demo-nav.js"></script>
</body>
</html>
