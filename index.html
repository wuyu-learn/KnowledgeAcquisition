<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公募基金定期报告信息</title>
  <link rel="stylesheet" href="./css/component.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/report-info.css">
  <link rel="stylesheet" href="./css/demo-nav.css">
</head>
<body>

  <!-- ============================================================
       A. 顶部导航
       ============================================================ -->
  <header class="top-nav-bar">
    <nav class="top-nav">
      <div class="nav-logo">
        <div class="nav-logo-icon">CUAM</div>
        <div class="nav-logo-text">
          <span class="main-title">信披与报告管理平台</span>
          <span class="sub-title">汇添富基金管理股份有限公司</span>
        </div>
      </div>

      <ul class="nav-menu">
        <li class="nav-menu-item active">
          <span class="menu-icon">☰</span>工作台
        </li>
        <li class="nav-menu-item">
          <span class="menu-icon">☰</span>信批日历
        </li>
        <li class="nav-menu-item">
          <span class="menu-icon">☰</span>模板管理
        </li>
        <li class="nav-menu-item">
          <span class="menu-icon">☰</span>数据管理
        </li>
        <li class="nav-menu-item">
          <span class="menu-icon">☰</span>系统管理
        </li>
      </ul>

      <div class="nav-actions">
        <div class="user-info">
          <span class="user-icon">👤</span>
          员工A
        </div>
        <div class="action-btn">
          <span class="action-icon">↪</span>
          退出
        </div>
      </div>
    </nav>
  </header>

  <!-- ============================================================
       B. 系统标签栏
       ============================================================ -->
  <div class="system-tabs-bar" id="tabBar">
    <div class="breadcrumb-trail" aria-label="位置">工作台</div>
    <div class="dynamic-tab-item active" data-tab="report-info">
      <span class="tab-title">公募基金定期报告信息</span>
      <span class="tab-close-icon" title="关闭标签" role="button" aria-label="关闭">×</span>
    </div>
  </div>

  <!-- ============================================================
       C. 业务主体
       ============================================================ -->
  <main class="page-body report-info-page">

    <!-- C.1 左侧：报告章节导航 -->
    <aside class="report-info-nav">
      <div class="report-info-nav__tabs" id="reportInfoNavTabs">
        <!-- 由 js/report-info.js 动态渲染 -->
      </div>
      <div class="report-info-nav__content" id="reportInfoNavContent">
        <!-- 由 js/report-info.js 动态渲染 -->
      </div>
    </aside>

    <!-- C.2 右侧：筛选区 + 表格区 -->
    <div class="report-info-main">

      <!-- 章节小标题 -->
      <section class="report-info-section-title">
        <div class="report-info-section-title__inner">
          <h2 class="report-info-content__title" id="reportInfoSheetTitle">—</h2>
          <span class="report-info-dimension-tag" id="reportInfoDimensionTag"></span>
          <span class="report-info-dimension-tag report-info-dimension-tag--content" id="reportInfoContentTypeTag"></span>
        </div>
      </section>

      <!-- 筛选区 -->
      <div class="filter-section">
        <section class="panel filters">
          <div class="filter-grid filter-grid--simple">
            <div class="field">
              <label for="reportPeriod">报告期</label>
              <select id="reportPeriod" class="control filter-select">
                <option value="">全部报告期</option>
              </select>
            </div>
            <div class="field">
              <label for="productInfo">产品信息</label>
              <input type="text" id="productInfo" class="control filter-input" placeholder="请输入产品名或代码">
            </div>
            <div class="field">
              <label for="reportName">报告名称</label>
              <input type="text" id="reportName" class="control filter-input" placeholder="请输入报告名称">
            </div>
            <div class="field">
              <label for="managerName">管理人名称</label>
              <select id="managerName" class="control filter-select">
                <option value="">全部</option>
              </select>
            </div>
            <div class="field">
              <label for="hasContent">是否有内容</label>
              <select id="hasContent" class="control filter-select">
                <option value="">全部</option>
                <option value="是">是</option>
                <option value="否">否</option>
              </select>
            </div>
            <div class="btn-row">
              <button class="btn primary" id="reportInfoSearchBtn" type="button">查询</button>
              <button class="btn" id="reportInfoResetBtn" type="button">重置</button>
              <button class="btn" id="reportInfoExportLogBtn" type="button">导出日志</button>
              <button class="btn" id="reportInfoExportListBtn" type="button">导出列表</button>
            </div>
          </div>
        </section>
      </div>

      <!-- 表格区 -->
      <section class="panel">
        <div class="table-toolbar">
          <div class="selection-info" id="reportInfoSelectionInfo">已选择 0 条</div>
          <div class="btn-row">
            <button class="btn primary" id="reportInfoAddBtn" type="button">新增</button>
            <button class="btn" id="reportInfoBatchLogBtn" disabled>批量查询日志</button>
            <button class="btn danger" id="reportInfoBatchDeleteBtn" disabled>批量删除</button>
            <button class="btn btn-refresh" id="reportInfoRefreshBtn" title="刷新列表" type="button"><span class="refresh-icon">↻</span> 刷新</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="reportInfoTableHead">
              <!-- 由 js/report-info.js 动态渲染 -->
            </thead>
            <tbody id="reportInfoTableBody">
              <!-- 由 js/report-info.js 动态渲染 -->
            </tbody>
          </table>
          <div class="empty" id="reportInfoEmpty" hidden>暂无数据</div>
        </div>

        <!-- 分页组件 -->
        <div class="pagination-container" id="reportInfoPagination">
          <div class="pagination-info">
            共 <span class="pagination-total" id="reportInfoPaginationTotal">0</span> 条
          </div>

          <div class="pagination-size">
            <select class="control pagination-size-select" id="reportInfoPageSizeSelect">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="20">20</option>
              <option value="50">50</option>
            </select>
            <span class="pagination-size-suffix">条/页</span>
          </div>

          <div class="pagination-nav" id="reportInfoPaginationNav">
            <button class="page-btn page-btn-prev" data-page="prev" title="上一页" disabled>‹</button>
            <button class="page-btn active" data-page="1">1</button>
            <button class="page-btn page-btn-next" data-page="next" title="下一页" disabled>›</button>
          </div>

          <div class="pagination-jump">
            前往
            <input type="number" class="control pagination-jump-input" id="reportInfoJumpInput" min="1">
            页
          </div>
        </div>
      </section>

    </div>

  </main>

  <div class="modal-mask" id="recordModalMask">
    <div aria-modal="true" aria-labelledby="recordModalTitle" class="modal record-modal" role="dialog">
      <div class="record-modal__header">
        <h2 id="recordModalTitle">查看记录</h2>
        <button class="btn icon-btn" id="recordModalCloseX" title="关闭" type="button">×</button>
      </div>
      <div class="record-modal__body" id="recordModalBody"></div>
      <div class="modal-actions record-modal__footer">
        <button class="btn" id="recordModalCancelBtn" type="button">取消</button>
        <button class="btn primary" id="recordModalSaveBtn" type="button">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-mask" id="confirmModalMask">
    <div aria-modal="true" aria-labelledby="confirmModalTitle" class="modal confirm-modal" role="dialog">
      <h2 id="confirmModalTitle">确认删除记录</h2>
      <p id="confirmModalBody">确定要删除这条记录吗？</p>
      <div class="modal-actions">
        <button class="btn" id="confirmModalCancelBtn" type="button">取消</button>
        <button class="btn danger" id="confirmModalConfirmBtn" type="button">确认删除</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- 功能导览面板挂载点 -->
  <div id="demo-nav-root"></div>

  <script src="./data/report-data.js"></script>
  <script src="./js/report-info.js"></script>
  <script src="./js/demo-nav.js"></script>
</body>
</html>
